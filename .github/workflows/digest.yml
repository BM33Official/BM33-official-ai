# เรียก /api/learn ให้บอท "เรียนรู้" จากแชต ทุก 1 ชั่วโมง
# หมายเหตุ: ถ้าไม่มีข้อความใหม่ digest จะคืนค่าเลย ไม่เรียก Gemini -> ชั่วโมงว่างไม่กิน request
#
# ต้องตั้ง 2 ค่าใน GitHub repo -> Settings -> Secrets and variables -> Actions:
#   LEARN_URL          = https://bm-33-official-ai.vercel.app/api/learn
#   LEARN_CRON_SECRET  = ค่าเดียวกับที่ตั้งใน Vercel (Secret)

name: bm33-learn-digest

on:
  schedule:
    - cron: "0 * * * *"   # ทุกต้นชั่วโมง (UTC — GitHub cron อาจดีเลย์ 5-15 นาที)
  workflow_dispatch: {}      # กดรันเองได้จากหน้า Actions

jobs:
  learn:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger digest
        run: |
          code=$(curl -sS -o /tmp/out.txt -w "%{http_code}" \
            -H "x-learn-secret: ${{ secrets.LEARN_CRON_SECRET }}" \
            "${{ secrets.LEARN_URL || vars.LEARN_URL }}")
          echo "HTTP $code"; cat /tmp/out.txt
          test "$code" = "200"
